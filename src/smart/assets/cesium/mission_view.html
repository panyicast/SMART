<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' data: blob: file: https: qrc:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: file: https: qrc:; style-src 'self' 'unsafe-inline' file: https:; img-src 'self' data: blob: file: https:; connect-src 'self' data: blob: file: https:; worker-src 'self' data: blob: file:;"
    >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Cesium Mission View</title>
    <script>
      window.CESIUM_BASE_URL = "./vendor/Build/Cesium/";
      window.__CESIUM_LOAD_FAILED__ = false;
    </script>
    <link
      rel="stylesheet"
      href="./vendor/Build/Cesium/Widgets/widgets.css"
    >
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #edf3f6;
        color: #17324a;
        font-family: "Segoe UI", sans-serif;
      }

      #viewer {
        position: absolute;
        inset: 0;
      }

      #overlay {
        position: absolute;
        top: 16px;
        left: 16px;
        z-index: 10;
        max-width: min(480px, calc(100% - 32px));
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(191, 202, 210, 0.86);
        background: rgba(255, 250, 242, 0.92);
        box-shadow: 0 10px 24px rgba(22, 38, 56, 0.12);
        font-size: 13px;
        line-height: 1.45;
      }

      #overlay[data-mode="error"] {
        background: rgba(122, 42, 24, 0.84);
        color: #fff6f2;
      }
    </style>
    <script
      src="./vendor/Build/Cesium/Cesium.js"
      onerror="window.__CESIUM_LOAD_FAILED__ = true;"
    ></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script defer src="./mission_view.js"></script>
  </head>
  <body>
    <div id="viewer"></div>
    <div id="overlay" data-mode="loading">Loading Cesium mission scene...</div>
  </body>
</html>
