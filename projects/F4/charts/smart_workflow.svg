<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="SMART mission analysis workflow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081521"/>
      <stop offset="1" stop-color="#11283a"/>
    </linearGradient>
    <style>
      .title{font:700 32px Arial,sans-serif;fill:#f5fbff}
      .subtitle{font:400 17px Arial,sans-serif;fill:#9fc7d6}
      .box{fill:#0f2434;stroke:#28d7f2;stroke-width:2;rx:14}
      .box2{fill:#172a34;stroke:#ff9d2e;stroke-width:2;rx:14}
      .label{font:700 18px Arial,sans-serif;fill:#f5fbff}
      .small{font:400 14px Arial,sans-serif;fill:#b7d5df}
      .arrow{stroke:#7adfed;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7adfed"/>
    </marker>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <text x="48" y="58" class="title">SMART Mission Analysis Workflow</text>
  <text x="48" y="88" class="subtitle">Project-based desktop workflow for orbit initialization, maneuver design, launch window analysis, tracking, STK/SPICE checks, and AI project reports.</text>
  <rect x="48" y="132" width="170" height="110" class="box"/>
  <text x="78" y="166" class="label">Project Setup</text>
  <text x="78" y="194" class="small">Satellite status</text>
  <text x="78" y="218" class="small">Orbit initialization</text>
  <rect x="278" y="132" width="190" height="110" class="box2"/>
  <text x="303" y="166" class="label">Design Maneuver</text>
  <text x="303" y="194" class="small">Pulse planning</text>
  <text x="303" y="218" class="small">Continuous thrust</text>
  <rect x="528" y="132" width="190" height="110" class="box"/>
  <text x="552" y="166" class="label">Import Maneuver</text>
  <text x="552" y="194" class="small">Strategy mapping</text>
  <text x="552" y="218" class="small">Orbit history CSV</text>
  <rect x="778" y="132" width="170" height="110" class="box"/>
  <text x="808" y="166" class="label">Windows</text>
  <text x="808" y="194" class="small">Launch windows</text>
  <text x="808" y="218" class="small">Tracking arcs</text>
  <rect x="1008" y="132" width="144" height="110" class="box2"/>
  <text x="1038" y="166" class="label">Outputs</text>
  <text x="1038" y="194" class="small">Charts</text>
  <text x="1038" y="218" class="small">Reports</text>
  <path d="M 218 187 H 268" class="arrow"/>
  <path d="M 468 187 H 518" class="arrow"/>
  <path d="M 718 187 H 768" class="arrow"/>
  <path d="M 948 187 H 998" class="arrow"/>
  <text x="48" y="300" class="small">STK 11.6 and local SPICE kernels remain first-class validation and conversion backends. UI times use Beijing Time; service boundaries store UTC.</text>
</svg>
